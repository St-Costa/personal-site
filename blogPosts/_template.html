    <div class="bottom_space_big">
        <h1>POST TITLE</h1>

            <div><em>DD Month YYYY</em></div>
            <div><em>XXX words</em> - <em>X min read</em></div>
            <div><em><a href="../mainPages/Blog_pages.html">Other posts</a></em></div>
        </div>

        <section class="toc">
            <div class="box-title">
                <h4>TOC</h4>
            </div>
            <!-- toc.js populates this automatically from h2/h3 elements -->
        </section>

        <section class="tldr">
            <div class="box-title">
                <h3>TL;DR</h3>
            </div>
            <p>One-paragraph summary of the post.</p>
        </section>


        <h2 id="section-1">
            <a href="#section-1">■ Section 1</a>
        </h2>

        <p class="justify">
            Body text here.
        </p>

        <h3 id="subsection-1-1">
            <a href="#subsection-1-1">└─ Subsection 1.1</a>
        </h3>

        <p class="justify">
            Body text here.
        </p>

        <hr>

        <h2 id="section-2">
            <a href="#section-2">■ Section 2</a>
        </h2>

        <p class="justify">
            Body text here.
        </p>
